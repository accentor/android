name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Test
      run: ./gradlew test
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Lint
      run: ./gradlew lint -PisCI=true
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Build
      run: |
        ./gradlew assemble
